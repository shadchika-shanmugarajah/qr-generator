<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 1.5rem;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    #qrcode {
      display: inline-block;
      padding: 1rem;
      background: white;
      border-radius: 12px;
      margin: 1rem 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    #qrcode img { display: block; }
    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>QR Code Generator</h1>
  <input type="url" id="url" placeholder="Enter URL or paste Google Drive link" value="https://drive.google.com/file/d/1YgNClXuWnF5h-slfsKnuF83aOPrYH04J/view?usp=sharing">
  <button onclick="generate()">Generate QR Code</button>
  <div id="qrcode"></div>
  <button id="downloadBtn" onclick="downloadQR()" style="display:none;">Download QR Code</button>

  <script>
    function generate() {
      const url = document.getElementById('url').value.trim();
      if (!url) {
        alert('Please enter a URL');
        return;
      }
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 256,
        height: 256
      });
      document.getElementById('downloadBtn').style.display = 'inline-block';
    }

    function downloadQR() {
      const img = document.querySelector('#qrcode img');
      if (!img) return;
      const a = document.createElement('a');
      a.href = img.src;
      a.download = 'qrcode.png';
      a.click();
    }

    // Generate on load with default URL
    generate();
  </script>
</body>
</html>
